<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050f05">
<title>ENV-MONITOR</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #050f05; color: #00ff41; font-family: 'Share Tech Mono', monospace, Courier, monospace; min-height: 100vh; overflow: hidden; position: relative; }
  body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.15) 2px, rgba(0,0,0,0.15) 4px); pointer-events: none; z-index: 1000; }
  body::after { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.7) 100%); pointer-events: none; z-index: 999; }
  #terminal { width: 100%; min-height: 100vh; padding: 16px; display: grid; grid-template-rows: auto 1fr auto; gap: 10px; position: relative; }

  /* Header - 綠色 */
  #header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #00aa2a; padding-bottom: 8px; font-size: 10px; color: #00aa2a; letter-spacing: 2px; flex-wrap: wrap; gap: 4px; }
  #sys-id { font-size: 11px; color: #00ff41; }

  /* 時鐘區 - 綠色 */
  #clock-section { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 8px 0; }
  #time-display { font-family: 'VT323', monospace; font-size: clamp(60px, 18vw, 130px); color: #00ff41; letter-spacing: 4px; text-shadow: 0 0 20px #00ff41, 0 0 40px #00aa2a; line-height: 1; animation: flicker 8s infinite; }
  @keyframes flicker { 0%,98%,100%{opacity:1} 98.5%{opacity:0.92} 99%{opacity:1} 99.5%{opacity:0.88} }
  #date-display { font-size: 13px; color: #00cc33; letter-spacing: 3px; margin-top: 4px; text-shadow: 0 0 10px #00aa2a; }
  #lunar-display { font-size: 11px; color: #00aa2a; letter-spacing: 2px; margin-top: 4px; }

  /* Ticker - 橙色 */
  #ticker-wrap { overflow: hidden; border: 1px solid #7a3a00; padding: 4px 0; background: rgba(255,140,0,0.04); }
  #ticker { white-space: nowrap; font-size: 10px; color: #cc6600; letter-spacing: 2px; animation: scroll-ticker 30s linear infinite; display: inline-block; }
  @keyframes scroll-ticker { 0%{transform:translateX(100vw)} 100%{transform:translateX(-100%)} }

  /* 四格面板 - 橙色 */
  #data-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 6px 0; }
  .data-panel { border: 1px solid #7a3a00; padding: 8px; background: rgba(255,140,0,0.04); position: relative; overflow: hidden; }
  .data-panel::before { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #ff8c00; opacity: 0.5; }
  .panel-label { font-size: 8px; color: #7a3a00; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 4px; }
  .panel-value { font-family: 'VT323', monospace; font-size: clamp(24px, 5vw, 32px); color: #ff8c00; line-height: 1; text-shadow: 0 0 8px #ff6600; }
  .panel-unit { font-size: 9px; color: #cc5500; margin-top: 2px; }
  .panel-bar { height: 3px; background: #3d1a00; margin-top: 4px; overflow: hidden; }
  .panel-bar-fill { height: 100%; background: #ff8c00; transition: width 1s ease; box-shadow: 0 0 4px #ff6600; }
  .aqi-good .panel-value { color: #ff8c00; text-shadow: 0 0 8px #ff6600; }
  .aqi-moderate .panel-value { color: #ffcc00; text-shadow: 0 0 8px #ffaa00; }
  .aqi-unhealthy .panel-value { color: #ff4400; text-shadow: 0 0 8px #ff2200; }
  .aqi-hazardous .panel-value { color: #ff0000; text-shadow: 0 0 8px #cc0000; }

  /* 底部狀態列 - 橙色 */
  #status-bar { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; border-top: 1px solid #7a3a00; padding-top: 8px; }
  .status-block { font-size: 10px; color: #cc6600; letter-spacing: 1px; }
  .status-block .status-title { color: #7a3a00; font-size: 8px; letter-spacing: 2px; margin-bottom: 3px; }
  #tts-log { font-size: 10px; color: #cc6600; min-height: 14px; letter-spacing: 1px; word-break: break-all; }
  #tts-log.active { color: #ff8c00; text-shadow: 0 0 6px #ff6600; animation: blink-text 0.5s infinite; }
  @keyframes blink-text { 50%{opacity:0.6} }
  #voice-indicator { display: flex; align-items: center; gap: 6px; font-size: 9px; color: #7a3a00; letter-spacing: 1px; }
  #voice-dot { width: 8px; height: 8px; border-radius: 50%; background: #3d1a00; transition: all 0.3s; flex-shrink: 0; }
  #voice-indicator.listening #voice-dot { background: #ff8c00; box-shadow: 0 0 8px #ff6600; animation: pulse-dot 1s infinite; }
  #voice-indicator.heard #voice-dot { background: #ffff00; box-shadow: 0 0 8px #ffff00; }
  @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.4);opacity:0.7} }
  #ambient-controls { display: flex; gap: 4px; align-items: center; flex-wrap: wrap; }
  .amb-btn { font-family: 'Share Tech Mono', monospace; font-size: 8px; color: #7a3a00; border: 1px solid #3d1a00; background: none; padding: 3px 6px; cursor: pointer; letter-spacing: 1px; transition: all 0.2s; }
  .amb-btn:hover, .amb-btn.active { color: #ff8c00; border-color: #cc5500; background: rgba(255,140,0,0.07); text-shadow: 0 0 4px #ff6600; }
  .cursor::after { content: '_'; animation: blink 1s step-end infinite; color: #ff8c00; }
  @keyframes blink { 50%{opacity:0} }
  .wx-icon { font-size: 16px; line-height: 1; margin-bottom: 2px; }

  /* 手機橫豎螢幕適配 */
  @media (max-width: 480px) {
    #data-grid { grid-template-columns: repeat(2, 1fr); }
    #status-bar { grid-template-columns: 1fr; gap: 6px; }
    #header { font-size: 9px; }
  }
</style>
</head>
<body>
<canvas id="bg-canvas" style="position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;opacity:0.12;"></canvas>
<div id="terminal">
  <div id="header">
    <span id="sys-id">ENV-MONITOR v4.2.2</span>
    <span><span id="coord-val">24.16°N 120.68°E</span> // <span id="loc-display">定位中...</span></span>
    <span>UP: <span id="uptime-val">00:00:00</span></span>
  </div>
  <div>
    <div id="clock-section">
      <div id="time-display">00:00:00</div>
      <div id="date-display">---- -- -- [---]</div>
      <div id="lunar-display">農曆 載入中...</div>
    </div>
    <div id="ticker-wrap"><span id="ticker">// 系統啟動中 //</span></div>
    <div id="data-grid" style="margin-top:6px;">
      <div class="data-panel" id="panel-temp">
        <div class="panel-label">■ 氣溫 TEMP</div>
        <div class="wx-icon" id="wx-icon">◈</div>
        <div class="panel-value" id="val-temp">--</div>
        <div class="panel-unit">°C / <span id="val-feel">--</span>°C 體感</div>
        <div class="panel-bar"><div class="panel-bar-fill" id="bar-temp" style="width:50%"></div></div>
      </div>
      <div class="data-panel">
        <div class="panel-label">■ 濕度 HUMID</div>
        <div class="wx-icon">〜</div>
        <div class="panel-value" id="val-humid">--</div>
        <div class="panel-unit">% RH</div>
        <div class="panel-bar"><div class="panel-bar-fill" id="bar-humid" style="width:0%"></div></div>
      </div>
      <div class="data-panel" id="panel-aqi">
        <div class="panel-label">■ 空氣 AQI</div>
        <div class="wx-icon">⊕</div>
        <div class="panel-value" id="val-aqi">--</div>
        <div class="panel-unit" id="aqi-label">PM2.5 載入中</div>
        <div class="panel-bar"><div class="panel-bar-fill" id="bar-aqi" style="width:0%"></div></div>
      </div>
      <div class="data-panel">
        <div class="panel-label">■ 風速 WIND</div>
        <div class="wx-icon" id="wind-icon">↗</div>
        <div class="panel-value" id="val-wind">--</div>
        <div class="panel-unit"><span id="val-wdir">--</span> / <span id="val-desc">--</span></div>
        <div class="panel-bar"><div class="panel-bar-fill" id="bar-wind" style="width:0%"></div></div>
      </div>
    </div>
  </div>
  <div id="status-bar">
    <div class="status-block">
      <div class="status-title">▶ TTS 報時</div>
      <div id="tts-log" class="cursor">待機中</div>
    </div>
    <div class="status-block">
      <div class="status-title">▶ 聲控</div>
      <div id="voice-indicator"><div id="voice-dot"></div><span id="voice-status">STANDBY</span></div>
      <button class="amb-btn" id="voice-btn" onclick="toggleVoice()" style="margin-top:3px;">啟動聆聽</button>
    </div>
    <div class="status-block">
      <div class="status-title">▶ 環境音效</div>
      <div id="ambient-controls">
        <button class="amb-btn" id="btn-rain" onclick="toggleAmbient('rain')">雨聲</button>
        <button class="amb-btn" id="btn-white" onclick="toggleAmbient('white')">白噪</button>
        <button class="amb-btn" onclick="stopAmbient()">靜音</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── 農曆算法 (原汁原味保留) ──
const TIAN_GAN=['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const DI_ZHI=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const ZODIAC=['鼠','牛','虎','兔','龍','蛇','馬','羊','猴','雞','狗','豬'];
const LUNAR_MONTHS=['正','二','三','四','五','六','七','八','九','十','冬','臘'];
const LUNAR_DAYS=['初一','初二','初三','初四','初五','初六','初七','初八','初九','初十','十一','十二','十三','十四','十五','十六','十七','十八','十九','二十','廿一','廿二','廿三','廿四','廿五','廿六','廿七','廿八','廿九','三十'];
const LUNAR_DATA=[
  [2000,205,0b1010010101010,8],[2001,124,0b0100101010110,5],[2002,212,0b1010010101010,4],
  [2003,201,0b0101001010101,2],[2004,122,0b1001010010101,2],[2005,209,0b0101101001010,3],
  [2006,129,0b0101010101010,7],[2007,218,0b1010010101010,7],[2008,207,0b1010010101001,5],
  [2009,126,0b0101001001010,5],[2010,214,0b0101010010101,8],[2011,203,0b0101010101010,6],
  [2012,123,0b1001010101010,4],[2013,210,0b1010010010101,9],[2014,131,0b0101010010101,9],
  [2015,219,0b0101010101010,6],[2016,208,0b1010100101010,6],[2017,128,0b0101010010101,6],
  [2018,216,0b0100101001010,0],[2019,205,0b1010010010101,0],[2020,125,0b0101001010100,4],
  [2021,212,0b1001010101010,0],[2022,201,0b1010010101010,3],[2023,122,0b0101010010101,2],
  [2024,210,0b1010010101010,6],[2025,129,0b0101001010101,6],[2026,217,0b0010101001010,0],
  [2027,206,0b1001010010101,0],[2028,126,0b0101010010101,5],[2029,213,0b0100101010010,0],
  [2030,203,0b1010010101010,0],
];
function getLunarDate(date) {
  try {
    const y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
    let row=LUNAR_DATA.find(r=>r[0]===y);
    if(!row) return "資料超出範圍";
    const sfMM=Math.floor
